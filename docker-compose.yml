version: '3.8'

# ─────────────────────────────────────────────
# Base / Production compose file
# Use with: docker compose up
# ─────────────────────────────────────────────

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - atm-network

  atm-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production          # ← explicit production stage
    container_name: atm-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Server: "db"
      Database__Name: "ATMBankingDB"
      Database__User: "sa"
      Database__Password: "${SA_PASSWORD}"
      Database__TrustServerCertificate: "true"
    depends_on:
      - db
#        condition: healthcheck
    networks:
      - atm-network

  atm-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: atm-ui
    ports:
      - "3000:80"
    depends_on:
      - atm-api
    networks:
      - atm-network

volumes:
  sqldata:

networks:
  atm-network:
    driver: bridge