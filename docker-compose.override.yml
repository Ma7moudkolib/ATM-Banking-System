version: '3.8'

# ─────────────────────────────────────────────
# Development overrides
# Use with: docker compose -f docker-compose.yml -f docker-compose.override.yml up
# (Docker Compose merges this file automatically when both are present)
# ─────────────────────────────────────────────

services:
  db:
    ports:
      # Keep SQL Server port accessible from host for local management tools
      - "1433:1433"
    environment:
      SA_PASSWORD: "YourStrong@Password123"   # dev-only password; never commit prod secrets

  atm-api:
    build:
      target: development                      # ← switch to the development stage
    container_name: atm-api-dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Server: "db"
      Database__Name: "ATMBankingDB"
      Database__User: "sa"
      Database__Password: "YourStrong@Password123"
      Database__Port: "1433"
      Database__TrustServerCertificate: "true"
    volumes:
      # Mount source code so dotnet watch picks up changes without rebuilding
      - ./backend:/src
      # Anonymous volumes prevent host's empty bin/obj from shadowing container's
      - /src/ATM.API/bin
      - /src/ATM.API/obj
      - /src/ATM.Domain/bin
      - /src/ATM.Domain/obj
      - /src/ATM.Application/bin
      - /src/ATM.Application/obj
      - /src/ATM.Infrastructure/bin
      - /src/ATM.Infrastructure/obj

  atm-ui:
    environment:
      # Enable polling-based file watching (required on Windows/macOS Docker Desktop)
      - CHOKIDAR_USEPOLLING=true